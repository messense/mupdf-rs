name: Publish to crates.io
on:
  push:
    tags: ['v*']  # Triggers when pushing tags starting with 'v'
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: "recursive"
        fetch-depth: 500
    - uses: rust-lang/crates-io-auth-action@v1
      id: auth
    - run: sudo apt-get update --fix-missing && sudo apt-get -y install libfontconfig1-dev # required to compile mupdf
    - run: cargo publish -p mupdf-sys
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
    - run: cargo publish -p mupdf-fonts-droid
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
    - run: cargo publish -p mupdf-fonts-noto
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
    - run: cargo publish -p mupdf-fonts-sil
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
    - name: Publish mupdf
      run: |
        for attempt in 1 2 3 4 5; do
          if cargo publish; then
            exit 0
          fi
          echo "cargo publish failed; retrying after crates.io index propagation ($attempt/5)"
          sleep 30
        done
        exit 1
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
